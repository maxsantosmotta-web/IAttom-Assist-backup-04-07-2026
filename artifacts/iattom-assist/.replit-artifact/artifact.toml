kind = "web"
previewPath = "/"
title = "IAttom Assist"
version = "1.0.0"
id = "artifacts/iattom-assist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25638

[services.development]
run = "pnpm --filter @workspace/iattom-assist run dev"

[services.production]
publicDir = "artifacts/iattom-assist/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/iattom-assist", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "25638"
BASE_PATH = "/"
VITE_BETA_MODE = "true"
VITE_CLERK_PROXY_URL = "https://iattomassist.com.br/api/__clerk"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25638"
BASE_PATH = "/"
