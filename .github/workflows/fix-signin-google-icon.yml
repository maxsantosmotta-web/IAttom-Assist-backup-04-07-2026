name: Preserve validated sign-in visual

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-signin-google-icon.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore original Google icon path without touching layout
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('artifacts/iattom-assist/src/pages/SignInPage.tsx')
          text = path.read_text()
          wrong = 'M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-2.86 3.31-4.53z'
          right = 'M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z'
          if wrong not in text:
              raise SystemExit('Expected Google icon path not found')
          path.write_text(text.replace(wrong, right, 1))
          PY
          git rm .github/workflows/fix-signin-google-icon.yml
      - name: Commit visual integrity fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/iattom-assist/src/pages/SignInPage.tsx
          git commit -m "Preserve validated sign-in visual while updating Clerk flow"
          git push
