name: Fix Clerk hooks once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-clerk-hooks.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace incompatible legacy Clerk hooks
        run: |
          sed -i 's|from "@clerk/react/legacy"|from "@clerk/react"|g' artifacts/iattom-assist/src/pages/SignInPage.tsx
          sed -i 's|from "@clerk/react/legacy"|from "@clerk/react"|g' artifacts/iattom-assist/src/pages/SignUpPage.tsx
          git rm .github/workflows/fix-clerk-hooks.yml
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/iattom-assist/src/pages/SignInPage.tsx artifacts/iattom-assist/src/pages/SignUpPage.tsx
          git commit -m "Fix infinite Clerk loading in auth pages"
          git push
