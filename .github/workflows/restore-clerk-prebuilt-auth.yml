name: Restore Clerk prebuilt authentication

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-clerk-prebuilt-auth.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace incompatible custom Clerk flow with supported prebuilt flow
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('artifacts/iattom-assist/src/App.tsx')
          text = path.read_text()

          text = text.replace(
              'import { ClerkProvider, Show, useClerk, AuthenticateWithRedirectCallback } from "@clerk/react";',
              'import { ClerkProvider, Show, useClerk, SignIn, SignUp } from "@clerk/react";'
          )

          pattern = re.compile(
              r'function SignInCallbackPage\(\) \{.*?\n\}\n\nfunction SignUpCallbackPage\(\) \{.*?\n\}',
              re.S,
          )
          replacement = '''function SignInCallbackPage() {
            return (
              <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center px-4">
                <SignIn
                  routing="path"
                  path={`${basePath}/sign-in`}
                  fallbackRedirectUrl={`${basePath}/dashboard/billing`}
                  appearance={clerkAppearance}
                />
              </div>
            );
          }

          function SignUpCallbackPage() {
            return (
              <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center px-4">
                <SignUp
                  routing="path"
                  path={`${basePath}/sign-up`}
                  fallbackRedirectUrl={`${basePath}/dashboard/billing`}
                  appearance={clerkAppearance}
                />
              </div>
            );
          }'''

          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Expected one auth callback block, replaced {count}')

          path.write_text(updated)
          PY
          git rm .github/workflows/restore-clerk-prebuilt-auth.yml
      - name: Commit root fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/iattom-assist/src/App.tsx
          git commit -m "Restore supported Clerk authentication flow"
          git push
