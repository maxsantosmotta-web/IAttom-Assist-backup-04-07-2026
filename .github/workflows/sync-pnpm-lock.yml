name: Sync pnpm lockfile

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-pnpm-lock.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'artifacts/**/package.json'
      - 'lib/**/package.json'
      - 'scripts/package.json'

permissions:
  contents: write

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.12.1 --activate

      - name: Regenerate lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Commit updated lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "Sync pnpm lockfile with workspace packages"
          git push
