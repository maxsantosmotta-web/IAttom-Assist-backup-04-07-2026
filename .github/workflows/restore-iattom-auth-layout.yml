name: Restore IAttom auth layout

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-iattom-auth-layout.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore validated IAttom login and signup layout
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('artifacts/iattom-assist/src/App.tsx')
          text = path.read_text()

          text = text.replace(
              'import { ClerkProvider, Show, useClerk, SignIn, SignUp } from "@clerk/react";',
              'import { ClerkProvider, Show, useClerk, AuthenticateWithRedirectCallback } from "@clerk/react";'
          )

          pattern = re.compile(
              r'function SignInCallbackPage\(\) \{.*?\n\}\n\nfunction SignUpCallbackPage\(\) \{.*?\n\}',
              re.S,
          )
          replacement = '''function SignInCallbackPage() {
            const [location] = useLocation();
            if (location.includes("/sso-callback")) {
              return <AuthenticateWithRedirectCallback />;
            }
            return <SignInPage />;
          }

          function SignUpCallbackPage() {
            const [location] = useLocation();
            if (location.includes("/sso-callback")) {
              return <AuthenticateWithRedirectCallback />;
            }
            return <SignUpPage />;
          }'''

          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Expected one auth block, replaced {count}')

          path.write_text(updated)
          PY
          git rm .github/workflows/restore-iattom-auth-layout.yml
      - name: Commit restored visual identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/iattom-assist/src/App.tsx
          git commit -m "Restore validated IAttom authentication layout"
          git push
