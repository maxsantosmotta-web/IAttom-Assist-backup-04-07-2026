openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IAttom Assist API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: history
    description: Activity history
  - name: dashboard
    description: Dashboard summary
  - name: auth
    description: Authentication helpers
  - name: admin
    description: Admin operations
  - name: credits
    description: Credits management
  - name: ai
    description: AI generation modules
  - name: billing
    description: Subscription billing and plan management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List recent activity history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of history items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryItem"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /auth/sync:
    post:
      operationId: syncUser
      tags: [auth]
      summary: Sync authenticated Clerk user to database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncUserBody"
      responses:
        "200":
          description: Synced user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not synced yet

  /credits/balance:
    get:
      operationId: getCreditsBalance
      tags: [credits]
      summary: Get current user credits balance and plan info
      responses:
        "200":
          description: Credits balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditsBalance"

  /credits/transactions:
    get:
      operationId: listCreditTransactions
      tags: [credits]
      summary: List credit transactions for current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Credit transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditTransactionList"

  /credits/use:
    post:
      operationId: useCredits
      tags: [credits]
      summary: Deduct credits for an AI feature use
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UseCreditsBody"
      responses:
        "200":
          description: Credits deducted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UseCreditsResult"
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientCreditsError"

  /ai/find-products:
    post:
      operationId: aiFindProducts
      tags: [ai]
      summary: Discover products via AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiFindProductsBody"
      responses:
        "200":
          description: SSE stream of AI product recommendations
          content:
            text/event-stream: {}

  /ai/validate-product:
    post:
      operationId: aiValidateProduct
      tags: [ai]
      summary: Validate a product idea via AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiValidateProductBody"
      responses:
        "200":
          description: SSE stream of AI product validation
          content:
            text/event-stream: {}

  /ai/create-campaign:
    post:
      operationId: aiCreateCampaign
      tags: [ai]
      summary: Generate a full marketing campaign via AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCreateCampaignBody"
      responses:
        "200":
          description: SSE stream of AI campaign strategy
          content:
            text/event-stream: {}

  /ai/refine-campaign-block:
    post:
      operationId: aiRefineCampaignBlock
      tags: [ai]
      summary: Refine a specific block of an existing campaign via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRefineCampaignBlockBody"
      responses:
        "200":
          description: Refined block content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRefineCampaignBlockResult"

  /ai/create-content:
    post:
      operationId: aiCreateContent
      tags: [ai]
      summary: Generate marketing content via AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCreateContentBody"
      responses:
        "200":
          description: SSE stream of AI content
          content:
            text/event-stream: {}

  /ai/creative-ideas:
    post:
      operationId: aiCreativeIdeas
      tags: [ai]
      summary: Generate creative ad concepts via AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCreativeIdeasBody"
      responses:
        "200":
          description: SSE stream of creative concepts
          content:
            text/event-stream: {}

  /ai/video-script:
    post:
      operationId: aiVideoScript
      tags: [ai]
      summary: Generate a video script via AI (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiVideoScriptBody"
      responses:
        "200":
          description: SSE stream of video script
          content:
            text/event-stream: {}

  /ai/generate-video:
    post:
      operationId: aiGenerateVideo
      tags: [ai]
      summary: Generate a talking avatar video via HeyGen (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGenerateVideoBody"
      responses:
        "200":
          description: SSE stream of video generation progress and result
          content:
            text/event-stream: {}

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users with optional filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: plan
          in: query
          schema:
            type: string
            enum: [free, pro, business, agency]
        - name: role
          in: query
          schema:
            type: string
            enum: [user, admin]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{id}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update a user's plan, role, or credits
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/credits:
    post:
      operationId: adminAdjustCredits
      tags: [admin]
      summary: Adjust a user's credits with a transaction record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAdjustCreditsBody"
      responses:
        "200":
          description: Adjustment applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/activity:
    get:
      operationId: listAdminActivity
      tags: [admin]
      summary: Platform-wide activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Platform activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminActivityItem"

  /admin/analytics:
    get:
      operationId: getAdminAnalytics
      tags: [admin]
      summary: Analytics data for charts
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"

  /admin/bootstrap:
    post:
      operationId: bootstrapAdmin
      tags: [admin]
      summary: Make current user an admin (only if no admins exist)
      responses:
        "200":
          description: User is now admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "409":
          description: Admins already exist

  /stripe/plans:
    get:
      operationId: getStripePlans
      tags: [billing]
      summary: List available subscription plans with prices
      responses:
        "200":
          description: Available plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StripePlan"

  /stripe/subscription:
    get:
      operationId: getStripeSubscription
      tags: [billing]
      summary: Get current user subscription status
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSubscriptionStatus"

  /stripe/checkout:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create a Stripe Checkout session for a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "500":
          description: Failed to create session

  /stripe/portal:
    post:
      operationId: createBillingPortal
      tags: [billing]
      summary: Create a Stripe Billing Portal session
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPortalResult"
        "500":
          description: Failed to create session

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [product_discovery, product_validation, campaign, content, creative, video_script, marketing]
        status:
          type: string
          enum: [draft, in_progress, completed]
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - status
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [product_discovery, product_validation, campaign, content, creative, video_script, marketing]
        status:
          type: string
          enum: [draft, in_progress, completed]
        description:
          type: string
      required:
        - name
        - type

    HistoryItem:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        module:
          type: string
        projectId:
          type: integer
        projectName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - action
        - module
        - createdAt

    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        completedProjects:
          type: integer
        totalActions:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - totalProjects
        - activeProjects
        - completedProjects
        - totalActions
        - recentProjects

    SyncUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
      required:
        - email

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        plan:
          type: string
          enum: [free, pro, business, agency]
        credits:
          type: integer
        betaAccess:
          type: boolean
        planSelected:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - email
        - role
        - plan
        - credits
        - betaAccess
        - planSelected
        - createdAt

    CreditsBalance:
      type: object
      properties:
        balance:
          type: integer
        creativeBalance:
          type: integer
        plan:
          type: string
          enum: [free, pro, business, agency]
        planLimit:
          type: integer
        creativePlanLimit:
          type: integer
        percentage:
          type: number
        creativePercentage:
          type: number
        lowCredit:
          type: boolean
        lowCreativeCredit:
          type: boolean
        featureCosts:
          type: object
          additionalProperties:
            type: integer
      required:
        - balance
        - creativeBalance
        - plan
        - planLimit
        - creativePlanLimit
        - percentage
        - creativePercentage
        - lowCredit
        - lowCreativeCredit
        - featureCosts

    CreditTransaction:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        amount:
          type: integer
        type:
          type: string
          enum: [initial, credit, debit, adjustment, refund]
        feature:
          type: string
        description:
          type: string
        balanceBefore:
          type: integer
        balanceAfter:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - amount
        - type
        - description
        - balanceBefore
        - balanceAfter
        - createdAt

    CreditTransactionList:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/CreditTransaction"
        total:
          type: integer
        balance:
          type: integer
      required:
        - transactions
        - total
        - balance

    UseCreditsBody:
      type: object
      properties:
        feature:
          type: string
          enum: [product_discovery, product_validation, campaign, content, creativeImage1, creativeImage2, creativeImage3, video_script, prompt_creation]
      required:
        - feature

    UseCreditsResult:
      type: object
      properties:
        creditsUsed:
          type: integer
        newBalance:
          type: integer
        transactionId:
          type: integer
      required:
        - creditsUsed
        - newBalance
        - transactionId

    InsufficientCreditsError:
      type: object
      properties:
        error:
          type: string
        balance:
          type: integer
        required:
          type: integer
      required:
        - error
        - balance
        - required

    AdminAdjustCreditsBody:
      type: object
      properties:
        amount:
          type: integer
        description:
          type: string
      required:
        - amount
        - description

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        plan:
          type: string
          enum: [free, pro, business, agency]
        credits:
          type: integer
        projectCount:
          type: integer
        actionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        banned:
          type: boolean
      required:
        - id
        - clerkId
        - email
        - role
        - plan
        - credits
        - projectCount
        - actionCount
        - createdAt
        - banned

    AdminUserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        total:
          type: integer
      required:
        - users
        - total

    UpdateAdminUserBody:
      type: object
      properties:
        role:
          type: string
          enum: [user, admin]
        plan:
          type: string
          enum: [free, pro, business, agency]
        credits:
          type: integer

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalProjects:
          type: integer
        totalActions:
          type: integer
        adminCount:
          type: integer
        planBreakdown:
          type: object
          properties:
            free:
              type: integer
            pro:
              type: integer
            business:
              type: integer
            agency:
              type: integer
          required: [free, pro, business, agency]
        newUsersThisMonth:
          type: integer
        newProjectsThisMonth:
          type: integer
      required:
        - totalUsers
        - totalProjects
        - totalActions
        - adminCount
        - planBreakdown
        - newUsersThisMonth
        - newProjectsThisMonth

    AdminActivityItem:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        module:
          type: string
        projectName:
          type: string
        userEmail:
          type: string
        userName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - action
        - module
        - createdAt

    AdminAnalytics:
      type: object
      properties:
        userGrowth:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              users:
                type: integer
              projects:
                type: integer
            required: [month, users, projects]
        featureUsage:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
              percentage:
                type: number
            required: [name, count, percentage]
        planRevenue:
          type: array
          items:
            type: object
            properties:
              plan:
                type: string
              users:
                type: integer
              mrr:
                type: number
            required: [plan, users, mrr]
      required:
        - userGrowth
        - featureUsage
        - planRevenue

    StripePlan:
      type: object
      properties:
        planKey:
          type: string
          enum: [free, pro, business, agency]
        name:
          type: string
        description:
          type: string
        credits:
          type: integer
        amount:
          type: integer
        currency:
          type: string
        interval:
          type: string
        priceId:
          type: string
          nullable: true
        features:
          type: array
          items:
            type: string
      required:
        - planKey
        - name
        - description
        - credits
        - amount
        - currency
        - interval
        - features

    StripeSubscriptionStatus:
      type: object
      properties:
        hasSubscription:
          type: boolean
        status:
          type: string
          nullable: true
        planKey:
          type: string
          enum: [free, pro, business, agency]
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
        stripeCustomerId:
          type: string
          nullable: true
        stripeSubscriptionId:
          type: string
          nullable: true
      required:
        - hasSubscription
        - planKey
        - cancelAtPeriodEnd

    CreateCheckoutBody:
      type: object
      properties:
        priceId:
          type: string
        planKey:
          type: string
      required:
        - priceId
        - planKey

    CheckoutResult:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    BillingPortalResult:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    AiFindProductsBody:
      type: object
      properties:
        query:
          type: string
        niche:
          type: string
        priceRange:
          type: string
        targetMarket:
          type: string
      required:
        - query

    AiValidateProductBody:
      type: object
      properties:
        productName:
          type: string
        description:
          type: string
        targetMarket:
          type: string
        pricePoint:
          type: string
      required:
        - productName

    AiCreateCampaignBody:
      type: object
      properties:
        product:
          type: string
        audience:
          type: string
        goal:
          type: string
        mode:
          type: string
        platforms:
          type: array
          items:
            type: string
        budget:
          type: string
        productType:
          type: string
          enum:
            - Digital
            - Físico
            - Serviço
      required:
        - product

    AiRefineCampaignBlockBody:
      type: object
      properties:
        blockId:
          type: string
        currentContent:
          type: string
        instruction:
          type: string
        campaignContext:
          type: string
      required:
        - blockId
        - currentContent
        - instruction
        - campaignContext

    AiRefineCampaignBlockResult:
      type: object
      properties:
        refinedContent:
          type: string
      required:
        - refinedContent

    AiCreateContentBody:
      type: object
      properties:
        topic:
          type: string
        tone:
          type: string
        contentTypes:
          type: array
          items:
            type: string
        additionalContext:
          type: string
      required:
        - topic

    AiCreativeIdeasBody:
      type: object
      properties:
        prompt:
          type: string
        platform:
          type: string
          enum: [instagram, facebook, tiktok, mercado_livre, shopee, hotmart, kiwify, perfil]
        selectedFormats:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 3
      required:
        - prompt
        - platform
        - selectedFormats

    AiVideoScriptBody:
      type: object
      properties:
        product:
          type: string
        format:
          type: string
        duration:
          type: string
        hook:
          type: string
        style:
          type: string
      required:
        - product

    AiGenerateVideoBody:
      type: object
      properties:
        videoEstilo:
          type: string
          enum: [executivo, consultor, criador]
        videoAvatar:
          type: string
          enum: [masculino, feminino]
        videoAmbiente:
          type: string
        videoFormato:
          type: string
          enum: ["9:16", "1:1", "16:9"]
        videoDuration:
          type: integer
          enum: [30]
        videoPrompt:
          type: string
      required:
        - videoEstilo
        - videoAvatar
        - videoAmbiente
        - videoFormato
        - videoDuration
        - videoPrompt
